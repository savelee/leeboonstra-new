work:
  - name: "Google"
    position: "AI Software Engineer & Tech Lead (Global Office of the CTO)"
    url: "https://blog.google/products/google-cloud/octo-google-clouds-two-way-innovation-street/"
    startDate: "2022-10-01"
    endDate: null
    summary: "Direct technical strategy, software architecture, and high-velocity engineering pods inside the Google Cloud Office of the CTO (OCTO) Innovation Factory, delivering zero-to-one applied GenAI platforms."
    highlights:
      - "Architected and delivered the first-of-its-kind voice-ordering GenAI speech automation engine for Wendy's as Technical Team Lead; successfully resolved extreme acoustic and semantic ambiguity into strict POS machine code, driving a viral rollout across the USA with over 1 billion PR impressions."
      - "Invented and implemented a custom \"Speech Utterance Finalizer\" component that utilizes a high-speed model to eliminate the \"Human Deliberation\" audio fragmentation bottleneck; authored the resulting foundational patent (US20250078820A1) which secured a unique conversational technical moat for Google Cloud."
      - "Regained the Brazilian Supreme Court (STF) as a Tier-1 partner by architecting MultiDocAI, a time-aware legal reasoning pipeline that transformed open-ended generation into a constrained JSON-Schema ETL process, achieving 87% initial recall and precision up to 1.0."
      - "Architected a persistent StateMachine Orchestrator (Firestore/Spanner) featuring a Reflexive Analysis Loop, enabling headless virtual teammates to analyze execution errors, autonomously reschedule, and eliminate silent failures caused by timeouts."
      - "Established mandatory security guardrails for the autonomous agent ecosystem, institutionalizing \"Human-in-the-loop\" (HITL) approval gates, context-aware PII prevention, and environment-specific ACLs."
      - "Managed a €100k+ annual budget and allocated 25% of leadership effort to product safety as Chapter Lead of the Pride@ Netherlands ERG, directly auditing harmful Dutch dictionary terms for the Google Assistant engineering team."
      - "Authored the 69-page Prompt Engineering Guide on Kaggle, achieving global viral success with over 400,000 unique downloads, 550,000+ total views, and scaled insights to 130,000 subscribers via the Agentic AI workshop."
      - "Pioneered next-generation multi-agent coordination frameworks utilizing Gemini, Claude, and GPT-4, establishing architectural standards and secure cross-boundary communication protocols using LangGraph and GraphRAG."
      - "Direct technical direction and mentor elite software engineering teams across dynamic prototyping cycles, pioneering scalable MLOps benchmarks using internal high-performance frameworks (Antigravity)."

  - name: "Google"
    position: "Senior Developer Advocate & Applied AI Engineer"
    url: "https://google.com"
    startDate: "2019-01-01"
    endDate: "2022-10-01"
    summary: "Led developer enablement programs and applied engineering proof-of-concept pipelines, establishing cloud AI architecture patterns for Google Cloud's global ecosystem."
    highlights:
      - "Orchestrated the open-source architecture of RCE360, a 622k-line omnichannel platform that resolved persistent state management across Twilio, Business Messages, and Assistant, personally contributing 5.5k unique lines of code and shifting the CCAI product roadmap toward CCaaS."
      - "Accelerated enterprise migration to Google Vertex AI by designing, open-sourcing, and presenting technical architectures as a keynote speaker at over 50 large-scale global conferences (including Google I/O and Cloud Next) to audiences of up to 5,000 developers."

  - name: "Google Netherlands"
    position: "Senior Customer Engineer (Enterprise Platforms)"
    url: "https://google.com"
    startDate: "2017-01-01"
    endDate: "2019-01-01"
    summary: "Served as the primary technical advisor and systems architect for strategic Google Cloud enterprise financial clients in EMEA."
    highlights:
      - "Engineered secure cloud migration roadmaps, distributed computing models, and integration architectures for Tier-1 multinational banking clients including ING and Rabobank."

  - name: "Sencha Inc."
