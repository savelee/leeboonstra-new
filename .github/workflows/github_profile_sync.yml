name: GitHub Profile README Sync

on:
  push:
    branches: [master]
    paths:
      - 'source/_data/resume.yml'
      - 'scripts/sync-github-profile.js'
      - '.github/workflows/github_profile_sync.yml'
  workflow_dispatch: # Allow manual triggers

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Profile README
        env:
          GH_PROFILE_SYNC_TOKEN: ${{ secrets.GH_PROFILE_SYNC_TOKEN }}
        run: node scripts/sync-github-profile.js
