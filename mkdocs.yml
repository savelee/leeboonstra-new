site_name: "Lee Boonstra - Technical Architecture Docs"
site_description: "System specifications, pipelines, and agent development documentation."
site_author: "Lee Boonstra"

# Compile directly into Hexo's theme source folder so Hexo copies it to public/docs
site_dir: "themes/leeboonstra/source/docs"
docs_dir: "docs"

theme:
  name: "material"
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: "teal"
      accent: "cyan"
      toggle:
        icon: "material/brightness-7"
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: "slate"
      primary: "teal"
      accent: "cyan"
      toggle:
        icon: "material/brightness-4"
        name: "Switch to light mode"
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Technical Specifications: specs.md
  - Agent Development:
      - Overview: agent_development.md
      - GEO Integration: geo_integration.md
  - Local Run Manuals:
      - Stylesheet Maintenance: pipeline_assets.md
      - Hexo Site & Deployments: pipeline_hexo.md
      - Pipeline Custom Functions: pipeline_functions.md
      - Post Formatting Manual: post_formatting.md
      - Bento & Color Styling: style_updates.md
      - Modern Navigation Icons: style_updates_modern_icons.md
      - SEO & Voice Search Markup: structured_data_voice_search.md
      - Resume Print Architecture: print_resume.md
      - E-Reader & Reader Mode: reader-mode.md
      - AI Ingestion & Crawl Rules: ai_crawlers_ingestion.md
      - Google Analytics Integration: google_analytics.md
